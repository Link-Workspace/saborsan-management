<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f89240"/>
      <stop offset="100%" stop-color="#d95f00"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Subtle inner shine -->
  <rect width="32" height="16" rx="8" fill="url(#shine)"/>

  <!-- Navy bottom band -->
  <path d="M0 25 L32 25 L32 32 Q32 32 24 32 L8 32 Q0 32 0 32 Z" fill="#153b70"/>

  <!-- Grain dots (food identity) on top right -->
  <circle cx="25.5" cy="6.5" r="2"   fill="rgba(255,255,255,0.75)"/>
  <circle cx="22"   cy="5"   r="1.4" fill="rgba(255,255,255,0.55)"/>
  <circle cx="28"   cy="9"   r="1.4" fill="rgba(255,255,255,0.55)"/>

  <!-- Bold white S lettermark -->
  <text x="14" y="23.5"
        font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
        font-size="21" font-weight="900"
        text-anchor="middle"
        fill="white"
        dominant-baseline="auto">S</text>
</svg>
